<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Aging Vùng XBG</title>
<style>
  :root {
    --orange: #F26522;
    --orange-dark: #D4541A;
    --orange-light: #FFF0E8;
    --red: #E53E3E;
    --green: #38A169;
    --blue: #3182CE;
    --gray-50: #F9FAFB;
    --gray-100: #F3F4F6;
    --gray-200: #E5E7EB;
    --gray-400: #9CA3AF;
    --gray-600: #4B5563;
    --gray-800: #1F2937;
    --white: #FFFFFF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--gray-100); color: var(--gray-800); min-height: 100vh; }

  /* Header */
  .header { background: var(--orange); color: white; padding: 18px 28px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,.2); }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .header-logo { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
  .header-title { font-size: 17px; font-weight: 600; opacity: .95; }
  .header-sub { font-size: 12px; opacity: .8; margin-top: 2px; }
  .header-meta { text-align: right; font-size: 12px; opacity: .8; }
  #update-time { font-size: 13px; font-weight: 600; opacity: 1; }

  /* Layout */
  .main { max-width: 1400px; margin: 0 auto; padding: 24px 20px; }

  /* KPI Cards */
  .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
  .kpi-card {
    background: white; border-radius: 16px; padding: 24px 20px;
    display: flex; flex-direction: column; align-items: center; text-align: center;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
    border-top: 4px solid var(--orange);
    position: relative; overflow: hidden;
  }
  .kpi-card::before {
    content: ''; position: absolute; top: -30px; right: -30px;
    width: 100px; height: 100px; border-radius: 50%;
    background: var(--orange-light); opacity: .6;
  }
  .kpi-icon { font-size: 28px; margin-bottom: 10px; }
  .kpi-label { font-size: 12px; font-weight: 600; color: var(--gray-400); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 8px; }
  .kpi-value { font-size: 42px; font-weight: 800; color: var(--gray-800); line-height: 1; }
  .kpi-sub { font-size: 12px; color: var(--gray-400); margin-top: 6px; }
  .kpi-card.kpi-green { border-color: var(--green); }
  .kpi-card.kpi-green::before { background: #F0FFF4; }
  .kpi-card.kpi-green .kpi-value { color: var(--green); }
  .kpi-card.kpi-red { border-color: var(--red); }
  .kpi-card.kpi-red::before { background: #FFF5F5; }
  .kpi-card.kpi-red .kpi-value { color: var(--red); }
  .kpi-card.kpi-blue { border-color: var(--blue); }
  .kpi-card.kpi-blue::before { background: #EBF8FF; }
  .kpi-card.kpi-blue .kpi-value { color: var(--blue); }

  /* Section */
  .section { background: white; border-radius: 14px; box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 24px; overflow: hidden; }
  .section-header { padding: 16px 20px; border-bottom: 1px solid var(--gray-200); display: flex; align-items: center; gap: 10px; }
  .section-header h2 { font-size: 15px; font-weight: 700; color: var(--gray-800); }
  .section-badge { background: var(--orange); color: white; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
  .section-badge.red { background: var(--red); }
  .section-content { padding: 0; overflow-x: auto; }

  /* Tables */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead tr { background: var(--gray-50); }
  th { padding: 10px 14px; text-align: right; font-weight: 700; font-size: 11px; color: var(--gray-600); text-transform: uppercase; letter-spacing: .5px; border-bottom: 2px solid var(--gray-200); white-space: nowrap; }
  th:first-child, th:nth-child(2) { text-align: left; }
  td { padding: 9px 14px; text-align: right; border-bottom: 1px solid var(--gray-100); white-space: nowrap; }
  td:first-child, td:nth-child(2) { text-align: left; }
  tr:hover { background: var(--gray-50); }
  tr:last-child td { border-bottom: none; }

  .rank { color: var(--gray-400); font-size: 12px; font-weight: 700; width: 30px; display: inline-block; }
  .rank.top3 { color: var(--orange); }

  /* Value cells */
  .val-today { font-weight: 700; color: var(--orange-dark); }
  .val-zero { color: var(--gray-200); }

  /* Trend arrow */
  .trend-up { color: var(--red); }
  .trend-down { color: var(--green); }
  .trend-same { color: var(--gray-400); }

  /* Mini bar */
  .mini-bar-wrap { display: flex; align-items: center; gap: 6px; }
  .mini-bar { height: 6px; border-radius: 3px; background: var(--orange); min-width: 4px; }

  /* Badge bất ổn */
  .badge-unstable { display: inline-block; background: #FFF5F5; color: var(--red); border: 1px solid #FED7D7; border-radius: 6px; font-size: 10px; font-weight: 700; padding: 1px 6px; margin-left: 6px; }

  /* Loading */
  .loading { text-align: center; padding: 60px; color: var(--gray-400); font-size: 15px; }
  .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid var(--gray-200); border-top-color: var(--orange); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Date header cols */
  .col-date { background: var(--gray-50); }
  .col-latest { background: var(--orange-light) !important; color: var(--orange-dark) !important; }

  @media (max-width: 768px) {
    .kpi-row { grid-template-columns: repeat(2, 1fr); }
    .kpi-value { font-size: 32px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div>
      <div class="header-logo">GHN</div>
    </div>
    <div>
      <div class="header-title">Dashboard Aging Đơn &gt; 5 Ngày — Vùng XBG</div>
      <div class="header-sub">Dữ liệu tự động từ Google Sheet · 7 ngày gần nhất</div>
    </div>
  </div>
  <div class="header-meta">
    <div style="opacity:.8;font-size:11px">Cập nhật lúc</div>
    <div id="update-time">--</div>
  </div>
</div>

<div class="main">
  <div id="loading" class="section loading">
    <div><div class="spinner"></div></div>
    <div>Đang tải dữ liệu...</div>
  </div>

  <div id="content" style="display:none">
    <!-- KPI -->
    <div class="kpi-row" id="kpi-row"></div>

    <!-- Bưu Cục Bất Ổn - 7 ngày -->
    <div class="section">
      <div class="section-header">
        <span style="font-size:18px">⚠️</span>
        <h2>Bưu Cục Bất Ổn — Diễn Biến 7 Ngày</h2>
        <span class="section-badge red" id="unstable-count"></span>
      </div>
      <div class="section-content">
        <table id="tbl-unstable"></table>
      </div>
    </div>

    <!-- AM -->
    <div class="section">
      <div class="section-header">
        <span style="font-size:18px">👤</span>
        <h2>Theo AM — 7 Ngày Gần Nhất</h2>
        <span class="section-badge" id="am-count"></span>
      </div>
      <div class="section-content">
        <table id="tbl-am"></table>
      </div>
    </div>

    <!-- BC -->
    <div class="section">
      <div class="section-header">
        <span style="font-size:18px">🏪</span>
        <h2>Theo Bưu Cục — 7 Ngày Gần Nhất</h2>
        <span class="section-badge" id="bc-count"></span>
      </div>
      <div class="section-content">
        <table id="tbl-bc"></table>
      </div>
    </div>
  </div>
</div>

<script>
const SHEET_ID = '1jCWPRvfGA7d2uHL6_xT8ZxU3tgpOdlBK1-c4QT961ew';
const GID = '1424919323';
const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;

function parseCsv(text) {
  const lines = text.trim().split('\n');
  return lines.slice(1).map(l => {
    const cols = []; let cur = '', inQ = false;
    for (const c of l) {
      if (c === '"') inQ = !inQ;
      else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else cur += c;
    }
    cols.push(cur.trim()); return cols;
  });
}

function fmtDate(d) {
  if (!d) return '';
  const [y, m, day] = d.split('-');
  return `${day}/${m}`;
}

function trendIcon(curr, prev) {
  if (!prev) return '';
  if (curr > prev) return `<span class="trend-up">▲ ${curr-prev}</span>`;
  if (curr < prev) return `<span class="trend-down">▼ ${prev-curr}</span>`;
  return `<span class="trend-same">—</span>`;
}

function buildTable(tableEl, data, keyField, dates, unstableBCs) {
  const latest = dates[dates.length - 1];
  const maxVal = Math.max(...data.map(r => r[latest] || 0));

  let html = '<thead><tr>';
  html += `<th style="width:30px">#</th>`;
  html += `<th>${keyField === 'am' ? 'AM' : 'Bưu Cục'}</th>`;
  dates.forEach((d, i) => {
    const cls = i === dates.length - 1 ? 'col-latest' : 'col-date';
    html += `<th class="${cls}">${fmtDate(d)}</th>`;
  });
  html += `<th class="col-latest">Trend</th>`;
  html += '</tr></thead><tbody>';

  data.forEach((row, idx) => {
    const bc = row[keyField];
    const isUnstable = unstableBCs && unstableBCs.has(bc);
    const rankCls = idx < 3 ? 'rank top3' : 'rank';
    html += '<tr>';
    html += `<td><span class="${rankCls}">${idx+1}</span></td>`;
    html += `<td>${bc || '—'}${isUnstable ? '<span class="badge-unstable">⚠ bất ổn</span>' : ''}</td>`;
    dates.forEach((d, i) => {
      const v = row[d] || 0;
      const isLatest = i === dates.length - 1;
      const cls = isLatest ? 'val-today' : (v === 0 ? 'val-zero' : '');
      const barW = maxVal > 0 ? Math.round((v / maxVal) * 60) : 0;
      if (isLatest) {
        html += `<td class="col-latest"><div class="mini-bar-wrap"><div class="mini-bar" style="width:${barW}px"></div><span class="${cls}">${v > 0 ? v : '—'}</span></div></td>`;
      } else {
        html += `<td class="${cls}">${v > 0 ? v : '—'}</td>`;
      }
    });
    const curr = row[latest] || 0;
    const prevD = dates[dates.length - 2];
    const prev = row[prevD] || 0;
    html += `<td>${trendIcon(curr, prev)}</td>`;
    html += '</tr>';
  });

  html += '</tbody>';
  tableEl.innerHTML = html;
}

async function loadData() {
  const resp = await fetch(CSV_URL);
  const text = await resp.text();
  const rows = parseCsv(text);

  // Dates
  const allDates = [...new Set(rows.map(r => r[11]))].filter(d => d && d.startsWith('2026')).sort();
  const last7 = allDates.slice(-7);
  const latest = last7[last7.length - 1];
  const prev = last7[last7.length - 2];

  // Filter
  const recent = rows.filter(r => last7.includes(r[11]));
  const unstableRows = recent.filter(r => r[12] && r[12].includes('bất ổn'));
  const unstableBCSet = new Set(unstableRows.map(r => r[2]));

  // By date
  const byDate = {};
  recent.forEach(r => { byDate[r[11]] = (byDate[r[11]] || 0) + 1; });

  const latestTotal = byDate[latest] || 0;
  const prevTotal = byDate[prev] || 0;
  const delta = latestTotal - prevTotal;
  const unstableLatest = unstableRows.filter(r => r[11] === latest).length;

  // KPI cards
  const kpiEl = document.getElementById('kpi-row');
  const deltaClass = delta < 0 ? 'kpi-green' : delta > 0 ? 'kpi-red' : '';
  const deltaIcon = delta < 0 ? '▼' : delta > 0 ? '▲' : '—';
  const deltaSign = delta > 0 ? '+' : '';
  kpiEl.innerHTML = `
    <div class="kpi-card">
      <div class="kpi-icon">📦</div>
      <div class="kpi-label">Tổng Aging Hôm Nay</div>
      <div class="kpi-value">${latestTotal.toLocaleString()}</div>
      <div class="kpi-sub">${fmtDate(latest)}/2026</div>
    </div>
    <div class="kpi-card kpi-blue">
      <div class="kpi-icon">📅</div>
      <div class="kpi-label">Tổng Aging N-1</div>
      <div class="kpi-value">${prevTotal.toLocaleString()}</div>
      <div class="kpi-sub">${fmtDate(prev)}/2026</div>
    </div>
    <div class="kpi-card ${deltaClass}">
      <div class="kpi-icon">${delta < 0 ? '📉' : delta > 0 ? '📈' : '➡️'}</div>
      <div class="kpi-label">Tăng / Giảm so N-1</div>
      <div class="kpi-value">${deltaIcon} ${Math.abs(delta).toLocaleString()}</div>
      <div class="kpi-sub">${deltaSign}${delta} đơn so hôm qua</div>
    </div>
    <div class="kpi-card kpi-red">
      <div class="kpi-icon">⚠️</div>
      <div class="kpi-label">Aging BC Bất Ổn (hôm nay)</div>
      <div class="kpi-value">${unstableLatest.toLocaleString()}</div>
      <div class="kpi-sub">${unstableBCSet.size} bưu cục bất ổn</div>
    </div>
  `;

  // Unstable BC table
  const unstableMap = {};
  unstableRows.forEach(r => {
    const bc = r[2]; const d = r[11];
    if (!unstableMap[bc]) unstableMap[bc] = { bc };
    unstableMap[bc][d] = (unstableMap[bc][d] || 0) + 1;
  });
  const unstableArr = Object.values(unstableMap).sort((a, b) => (b[latest] || 0) - (a[latest] || 0));
  document.getElementById('unstable-count').textContent = `${unstableArr.length} bưu cục`;
  buildTable(document.getElementById('tbl-unstable'), unstableArr, 'bc', last7, null);

  // AM table
  const amMap = {};
  recent.forEach(r => {
    const am = r[10]; const d = r[11];
    if (!amMap[am]) amMap[am] = { am };
    amMap[am][d] = (amMap[am][d] || 0) + 1;
  });
  const amArr = Object.values(amMap).sort((a, b) => (b[latest] || 0) - (a[latest] || 0));
  document.getElementById('am-count').textContent = `${amArr.length} AM`;
  buildTable(document.getElementById('tbl-am'), amArr, 'am', last7, unstableBCSet);

  // BC table
  const bcMap = {};
  recent.forEach(r => {
    const bc = r[2]; const d = r[11];
    if (!bcMap[bc]) bcMap[bc] = { bc };
    bcMap[bc][d] = (bcMap[bc][d] || 0) + 1;
  });
  const bcArr = Object.values(bcMap).sort((a, b) => (b[latest] || 0) - (a[latest] || 0));
  document.getElementById('bc-count').textContent = `${bcArr.length} bưu cục`;
  buildTable(document.getElementById('tbl-bc'), bcArr, 'bc', last7, unstableBCSet);

  // Show
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';
  document.getElementById('update-time').textContent = new Date().toLocaleTimeString('vi-VN');
}

loadData().catch(e => {
  document.getElementById('loading').innerHTML = `<div style="color:#E53E3E">❌ Lỗi tải dữ liệu: ${e.message}</div>`;
});
</script>
</body>
</html>
